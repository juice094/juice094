name: Build Resume PDF

on:
  push:
    paths:
      - 'resume/zh.md'
      - 'resume/en.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex texlive-latex-recommended texlive-latex-extra

      - name: Build Chinese Resume
        if: hashFiles('resume/zh.md') != ''
        run: |
          pandoc resume/zh.md \
            -o resume/zh.pdf \
            --pdf-engine=xelatex \
            -V mainfont="Noto Serif CJK SC" \
            -V geometry:margin=1in \
            -V fontsize=11pt

      - name: Build English Resume
        if: hashFiles('resume/en.md') != ''
        run: |
          pandoc resume/en.md \
            -o resume/en.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V fontsize=11pt

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add resume/zh.pdf resume/en.pdf 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ci: auto-build resume PDFs"
          git push
